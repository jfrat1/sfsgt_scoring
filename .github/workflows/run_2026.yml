# This workflow will setup a python environment and execute the
# 2026 season runner.
name: Run 2026 Sheet Update

on:
  workflow_dispatch:

  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  run-season-2026:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      # Install dependencies cleanly using the cache
      - name: Install dependencies
        run: uv sync --frozen

      - name: Create Google credentials file
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_CREDENTIALS_FILE }}' > "google_cloud_creds/sfsgt-credentials.json"

      - name: Make logs directory
        run: mkdir ./.ignore

      - name: Run season
        run: |
          make run_2026

      - name: Remove credentials file
        if: always()
        run: rm -f "google_cloud_creds/sfsgt-credentials.json"


      - name: Upload debug log file
        uses: actions/upload-artifact@v7
        with:
          name: Debug log
          path: .ignore/app.log
          if-no-files-found: warn
          retention-days: 10

      # Optional future Slack/Discord notification
      - name: Notify on failure
        if: failure()
        run: |
          echo "Workflow failed"
