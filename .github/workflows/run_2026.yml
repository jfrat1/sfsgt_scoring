name: Run 2026 Sheet Update

on:
  workflow_dispatch:

  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  run-season-2026:
    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pipenv'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --deploy

      - name: Create Google credentials file
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_CREDENTIALS_FILE }}' > "google_cloud_creds/sfsgt-credentials.json"

      - name: Make logs directory
        run: mkdir ./.ignore

      - name: Run season
        run: |
          make run_2026

      - name: Remove credentials file
        if: always()
        run: rm -f "google_cloud_creds/sfsgt-credentials.json"

      # Optional future Slack/Discord notification
      - name: Notify on failure
        if: failure()
        run: |
          echo "Workflow failed"
